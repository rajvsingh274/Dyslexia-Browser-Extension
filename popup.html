<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      font-family: Arial;
      padding: 10px;
    }

    textarea {
      width: 100%;
      height: 160px;
      resize: vertical;
      font-size: 14px;
      padding: 8px;
      box-sizing: border-box;
      overflow: auto;
      white-space: pre-wrap;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 180px;
      overflow-y: auto;
      overflow-x: auto;
      background: #f4f4f4;
      padding: 8px;
    }

    /* 🔥 Color Grid */
    .color-grid {
      display: grid;
      grid-template-columns: repeat(2, 40px);
      gap: 12px;
      margin-top: 5px;
    }

    .color-circle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }

    /* ✅ Hover Effect (smooth zoom + shadow) */
    .color-circle:hover {
      transform: scale(1.15);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    /* ✅ Selected State */
    .color-circle.selected {
      border: 3px solid black;
      transform: scale(1.1);
    }

  </style>
</head>
<body>

  <h3>Simplify Text</h3>

  <textarea id="inputText"></textarea>

  <h4>How should we simplify?</h4>

  <label>Prefer shorter sentences</label>
  <input type="range" id="asl" min="0" max="100" value="40">

  <label>Prefer simpler words</label>
  <input type="range" id="asw" min="0" max="100" value="40">

  <label>Reduce difficult words</label>
  <input type="range" id="pdw" min="0" max="100" value="20">

  <p style="font-size:12px; color:gray;">
    ✔ Includes readability enhancement for dyslexic users
  </p>

  <h4>Choose Background Color</h4>

  <div class="color-grid" id="colorGrid">
    <div class="color-circle selected" data-color="#fff6cc" style="background:#fff6cc"></div>
    <div class="color-circle" data-color="#e6f7ff" style="background:#e6f7ff"></div>
    <div class="color-circle" data-color="#e6ffe6" style="background:#e6ffe6"></div>
    <div class="color-circle" data-color="#fbeaff" style="background:#fbeaff"></div>
  </div>

  <h4>Choose Font Style</h4>
  <select id="fontStyle">
    <option value="'Comic Sans MS', Arial, sans-serif">Comic Sans</option>
    <option value="Arial, sans-serif">Arial</option>
    <option value="Verdana, sans-serif">Verdana</option>
    <option value="'OpenDyslexic', sans-serif">OpenDyslexic</option>
  </select>

  <br><br>

  <button id="simplifyBtn">Simplify</button>

  <pre id="result"></pre>

  <script src="popup.js"></script>

</body>
</html>
